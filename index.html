<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aregularCorp | Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mencegah guncangan scroll/zoom bawaan HP saat menyentuh canvas */
        }

        body {
            background-color: #4be0e3; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Branding Overlay - Dibuat responsif untuk HP */
        .branding-container {
            position: absolute;
            bottom: 6%;
            right: 6%;
            text-align: right;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            color: #000000;
        }

        .studio, .research {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.2;
            opacity: 0.9;
        }

        .corp {
            font-size: 1.4rem;
            font-weight: 800;
            margin-top: 2px;
            letter-spacing: -0.02em;
        }

        .logo-circle {
            width: 55px;
            height: 55px;
            background-color: #000000;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            bottom: 12px;
            left: 12px;
        }

        .instruction {
            position: absolute;
            top: 4%;
            left: 5%;
            right: 5%;
            color: rgba(0, 0, 0, 0.45);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            z-index: 10;
            font-weight: 600;
            pointer-events: none;
        }

        /* Responsivitas Layar Desktop / Tablet */
        @media (min-width: 768px) {
            .instruction {
                font-size: 0.85rem;
            }
            .branding-container {
                bottom: 10%;
                right: 8%;
                gap: 20px;
            }
            .studio, .research {
                font-size: 1.5rem;
            }
            .corp {
                font-size: 1.8rem;
                margin-top: 4px;
            }
            .logo-circle {
                width: 70px;
                height: 70px;
            }
            .logo-dot {
                width: 16px;
                height: 16px;
                bottom: 16px;
                left: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="instruction">Move mouse or drag your finger for entertainment ;)</div>

    <canvas id="particle-canvas"></canvas>

    <div class="branding-container">
        <div class="text-group">
            <span class="studio">aregular-Studio</span>
            <span class="research">aregular-Research</span>
            <span class="corp">aregularCorp</span>
        </div>
        <div class="logo-circle">
            <div class="logo-dot"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let particles = [];
        // Mengatur radius interaksi awal berdasarkan lebar layar (lebih kecil di HP)
        let isMobile = window.innerWidth < 768;
        let mouse = { 
            x: null, 
            y: null, 
            radius: isMobile ? 60 : 110 
        };

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            isMobile = window.innerWidth < 768;
            mouse.radius = isMobile ? 60 : 110;

            setupParticles();
        }

        // Debounce resize event agar HP tidak lag saat rotasi layar
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(initCanvas, 200);
        });
        
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Touch support yang lebih presisi untuk layar sentuh HP
        window.addEventListener('touchmove', function(event) {
            if(event.touches.length > 0) {
                mouse.x = event.touches[0].clientX;
                mouse.y = event.touches[0].clientY;
            }
        }, { passive: true });

        window.addEventListener('touchend', function() {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                // Ukuran partikel disesuaikan agar tetap terlihat tajam di HP
                this.size = isMobile ? (Math.random() * 1.5 + 1.2) : (Math.random() * 2 + 1.5);
                this.baseX = targetX;
                this.baseY = targetY;
                this.density = (Math.random() * 25) + 15;
            }

            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                if (force < 0) force = 0;

                let directionX = (forceDirectionX * force * this.density);
                let directionY = (forceDirectionY * force * this.density);

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dxBack = this.x - this.baseX;
                        this.x -= dxBack / 12;
                    }
                    if (this.y !== this.baseY) {
                        let dyBack = this.y - this.baseY;
                        this.y -= dyBack / 12;
                    }
                }
            }
        }

        function setupParticles() {
            particles = [];
            ctx.fillStyle = 'white';
            
            // Ukuran font adaptif yang lebih proporsional di layar vertikal HP
            let fontSize = isMobile ? Math.min(canvas.width * 0.065, 24) : Math.min(canvas.width * 0.045, 52); 
            ctx.font = `900 ${fontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let text = "aregularCorp website is under construction";
            
            // Jika layar terlalu sempit (HP Potret), pecah teks menjadi dua baris agar tidak kepotong
            if (isMobile && canvas.width < 480) {
                ctx.fillText("aregularCorp website", canvas.width / 2, canvas.height / 2.5 - 15);
                ctx.fillText("is under construction", canvas.width / 2, canvas.height / 2.5 + 15);
            } else {
                ctx.fillText(text, canvas.width / 2, canvas.height / 2.3);
            }

            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Jarak pemindaian titik (step) disesuaikan agar performa render di HP tetap mulus (60fps)
            const step = isMobile ? 4 : Math.max(4, Math.floor(canvas.width / 350)); 

            for (let y = 0; y < textCoordinates.height; y += step) {
                for (let x = 0; x < textCoordinates.width; x += step) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y, x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
    </script>
</body>
</html>

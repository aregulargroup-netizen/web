<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aregularCorp | Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            /* Exactly matching your banner's vibrant cyan color */
            background-color: #4be0e3; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Interactive Canvas layer */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Branding Overlay mirroring your LinkedIn layout */
        .branding-container {
            position: absolute;
            bottom: 10%;
            right: 8%;
            text-align: right;
            z-index: 10;
            pointer-events: none; /* Allows mouse interactions to pass through to the dots */
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            color: #000000;
        }

        .studio, .research {
            font-size: 1.5rem;
            font-weight: 400;
            line-height: 1.2;
            opacity: 0.9;
        }

        .corp {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: -0.02em;
        }

        /* The signature black circle logo with white dot */
        .logo-circle {
            width: 70px;
            height: 70px;
            background-color: #000000;
            border-radius: 50%;
            position: relative;
        }

        .logo-dot {
            width: 16px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            bottom: 16px;
            left: 16px;
        }

        /* Instruction badge for the user */
        .instruction {
            position: absolute;
            top: 5%;
            left: 5%;
            color: rgba(0, 0, 0, 0.4);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            z-index: 10;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="instruction">Move your mouse for the entertainment ;)</div>

    <canvas id="particle-canvas"></canvas>

    <div class="branding-container">
        <div class="text-group">
            <span class="studio">aregular-Studio</span>
            <span class="research">aregular-Research</span>
            <span class="corp">aregularCorp</span>
        </div>
        <div class="logo-circle">
            <div class="logo-dot"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let particles = [];
        let mouse = { x: null, y: null, radius: 110 };

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupParticles();
        }

        window.addEventListener('resize', initCanvas);
        
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Touch support for mobile devices
        window.addEventListener('touchmove', function(event) {
            if(event.touches.length > 0) {
                mouse.x = event.touches[0].clientX;
                mouse.y = event.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', function() {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = Math.random() * 2 + 1.5; // clean minimalist white dots
                this.baseX = targetX;
                this.baseY = targetY;
                this.density = (Math.random() * 30) + 15;
            }

            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // Interaction physics
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                // Max out force threshold
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                if (force < 0) force = 0;

                let directionX = (forceDirectionX * force * this.density);
                let directionY = (forceDirectionY * force * this.density);

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Smoothly transition back to text formation
                    if (this.x !== this.baseX) {
                        let dxBack = this.x - this.baseX;
                        this.x -= dxBack / 12;
                    }
                    if (this.y !== this.baseY) {
                        let dyBack = this.y - this.baseY;
                        this.y -= dyBack / 12;
                    }
                }
            }
        }

        function setupParticles() {
            particles = [];
            
            // Render text hidden behind the scenes to sample dot coordinates
            ctx.fillStyle = 'white';
            
            // Adaptive font sizing based on screens
            let fontSize = Math.min(canvas.width * 0.045, 52); 
            ctx.font = `900 ${fontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Hidden text payload
            ctx.fillText("aregularCorp website is under construction", canvas.width / 2, canvas.height / 2.3);

            // Scan the text pixels to convert them into mathematical dots
            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Step rate determines dot density layout
            const step = Math.max(4, Math.floor(canvas.width / 350)); 

            for (let y = 0; y < textCoordinates.height; y += step) {
                for (let x = 0; x < textCoordinates.width; x += step) {
                    // Look for non-transparent pixels defining the text edges
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        particles.push(new Particle(x, y, x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // Initialize setup
        initCanvas();
        animate();
    </script>
</body>
</html>
